name: publish.yml
on:
  push:
    branches:
      - main
      - reference/*
      - lecture/*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22.x }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: "dist/" }
      - uses: actions/deploy-pages@v4

    permissions:
      id-token: write
      pages: write
